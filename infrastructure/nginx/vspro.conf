# ═══════════════════════════════════════════════════════════════
# VSPRO — Nginx Wildcard Subdomain Configuration
# Routes: *.vspro.mx → API with x-tenant-slug header injection
# ═══════════════════════════════════════════════════════════════

# Extract tenant slug from subdomain
map $host $tenant_slug {
    ~^(?P<slug>[a-z0-9-]+)\.vspro\.mx$  $slug;
    ~^(?P<slug>[a-z0-9-]+)\.vspro\.app$  $slug;
    default                               "";
}

# API upstream
upstream vspro_api {
    server 127.0.0.1:3001;
    keepalive 32;
}

# Frontend upstream
upstream vspro_web {
    server 127.0.0.1:3000;
    keepalive 16;
}

# ─── Wildcard: {slug}.vspro.mx → API ────────────────────────────
server {
    listen 443 ssl http2;
    server_name *.vspro.mx;

    ssl_certificate     /etc/ssl/certs/vspro.mx.pem;
    ssl_certificate_key /etc/ssl/private/vspro.mx.key;

    # Inject tenant slug as header for the API
    location /webhooks/ {
        # Webhooks don't need slug injection (slug is in URL path)
        proxy_pass http://vspro_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location /api/ {
        proxy_pass http://vspro_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header x-tenant-slug $tenant_slug;
    }

    location / {
        proxy_pass http://vspro_web;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header x-tenant-slug $tenant_slug;
    }
}

# ─── API domain: api.vspro.mx ───────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.vspro.mx;

    ssl_certificate     /etc/ssl/certs/vspro.mx.pem;
    ssl_certificate_key /etc/ssl/private/vspro.mx.key;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req zone=api burst=50 nodelay;

    location / {
        proxy_pass http://vspro_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for AI operations (can be slow)
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;
    }

    # Health check (no rate limit)
    location /health {
        proxy_pass http://vspro_api/health;
        access_log off;
    }
}

# ─── App domain: app.vspro.mx ───────────────────────────────────
server {
    listen 443 ssl http2;
    server_name app.vspro.mx www.vspro.mx;

    ssl_certificate     /etc/ssl/certs/vspro.mx.pem;
    ssl_certificate_key /etc/ssl/private/vspro.mx.key;

    location / {
        proxy_pass http://vspro_web;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ─── HTTP → HTTPS redirect ──────────────────────────────────────
server {
    listen 80;
    server_name *.vspro.mx api.vspro.mx app.vspro.mx www.vspro.mx;
    return 301 https://$host$request_uri;
}
