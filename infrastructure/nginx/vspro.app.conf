# ═══════════════════════════════════════════════════════════════
# VSPRO — Nginx Production Configuration for vspro.app
# SSL via Let's Encrypt (certbot)
# ═══════════════════════════════════════════════════════════════

# Extract tenant slug from subdomain
map $host $tenant_slug {
    ~^(?P<slug>[a-z0-9-]+)\.vspro\.app$  $slug;
    default                               "";
}

# API upstream
upstream vspro_api {
    server 127.0.0.1:3001;
    keepalive 32;
}

# Frontend upstream
upstream vspro_web {
    server 127.0.0.1:3000;
    keepalive 16;
}

# ─── Rate limiting ───────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=web_limit:10m rate=50r/s;

# ─── HTTP → HTTPS redirect ──────────────────────────────────────
server {
    listen 80;
    server_name vspro.app *.vspro.app;
    
    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── Main app: app.vspro.app ────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name app.vspro.app www.vspro.app vspro.app;

    ssl_certificate     /etc/letsencrypt/live/vspro.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vspro.app/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    limit_req zone=web_limit burst=100 nodelay;

    location / {
        proxy_pass http://vspro_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ─── API: api.vspro.app ─────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.vspro.app;

    ssl_certificate     /etc/letsencrypt/live/vspro.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vspro.app/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    limit_req zone=api_limit burst=50 nodelay;

    # Max body size for file uploads
    client_max_body_size 50M;

    location / {
        proxy_pass http://vspro_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Timeouts para operaciones de AI
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;
    }

    # Health check sin rate limit
    location /health {
        limit_req off;
        proxy_pass http://vspro_api/health;
        access_log off;
    }
}

# ─── Wildcard subdomains: {tenant}.vspro.app ─────────────────────
server {
    listen 443 ssl http2;
    server_name *.vspro.app;

    ssl_certificate     /etc/letsencrypt/live/vspro.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vspro.app/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Webhooks (no necesitan slug injection)
    location /webhooks/ {
        proxy_pass http://vspro_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # API requests con tenant slug
    location /api/ {
        proxy_pass http://vspro_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header x-tenant-slug $tenant_slug;
    }

    # Frontend con tenant context
    location / {
        proxy_pass http://vspro_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header x-tenant-slug $tenant_slug;
    }
}
